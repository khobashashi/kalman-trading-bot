name: Live Kalman Bot Daily

on:
  schedule:
    # 9:30 AM Eastern Time is 13:30 UTC time. 
    # This cron code tells GitHub to launch your bot automatically 
    # at 13:30 UTC every Monday through Friday (1-5).
    - cron: '30 13 * * 1-5'
  workflow_dispatch:
    # This keeps the manual "Run workflow" play button active just in case

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
           
      - name: Install dependencies
        run: pip install -r requirements.txt
         
      - name: Run script
        run: python -u main.py
